name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rust-checks:
    name: Rust Checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: stable
          components: rustfmt, clippy

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Format check
        run: cargo fmt --all -- --check

      - name: Lint (clippy - strict)
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Doc tests
        run: cargo test --doc --all-features

      - name: Build verification (release)
        run: cargo build --release --all-features

      - name: Tests
        shell: bash
        run: |
          set -o pipefail
          log_file=".ci-test-output.log"
          if ! cargo test --all-targets --all-features 2>&1 | tee "$log_file"; then
            failed_tests="$(grep -E 'test .+ \\.\\.\\. FAILED$' "$log_file" || true)"
            if [[ -n "$failed_tests" ]]; then
              while IFS= read -r line; do
                echo "::error title=Failed test::$line"
              done <<< "$failed_tests"
            else
              grep -E '(^error:|^failures:|thread .+ panicked|process didn.t exit successfully|signal:|Killed$|out of memory)' "$log_file" \
                | tail -n 50 \
                | while IFS= read -r line; do
                    echo "::error title=Test failure signal::$line"
                  done
              echo "::error title=Tests failed::No explicit FAILED test lines detected. See uploaded ci-test-log artifact."
            fi
            exit 1
          fi

      - name: Upload test log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: ci-test-log
          path: .ci-test-output.log
          if-no-files-found: ignore

      - name: Guardrail Tests
        run: cargo test --test guardrail_tests --test guardrail_integration_tests

      - name: Anti-Placeholder Check (Structured)
        run: |
          cargo test --test runtime_policy_enforcement --quiet
          cargo test --test ci_enforcement_tests --quiet

      - name: Patch Provider Diagnostics Tests
        run: cargo test --test patch_provider_diagnostics_tests --quiet

      - name: Patch fallback confinement check
        run: |
          if grep -R -n "with_fallback_allowed" src/ --exclude="repo.rs"; then
            echo "ERROR: with_fallback_allowed must not be used outside src/tools/repo.rs"
            exit 1
          fi
          echo "OK: fallback constructor confined to repo tool implementation"

      - name: Anti-regression check (no direct LLM calls in API)
        run: |
          # Fail if API handlers contain direct LlmClient::generate() calls
          # All execution must go through FlowExecutionService
          if grep -rn "LlmClient::generate\|llm_client\.generate" src/api/; then
            echo "ERROR: Direct LLM calls found in API handlers. Use FlowExecutionService instead."
            exit 1
          fi
          echo "OK: No direct LLM calls in API handlers"

