name: Feature
description: Plan and track a feature implementation
title: "feat: "
labels:
  - type: feature
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem does this solve?
    validations:
      required: true
  - type: textarea
    id: scope
    attributes:
      label: Scope
      description: What is in and out of scope?
    validations:
      required: true
  - type: textarea
    id: tasks
    attributes:
      label: Tasks
      description: List concrete implementation tasks.
      value: |
        - [ ] 
        - [ ] 
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance Criteria
      description: Conditions that must be true to close this issue.
      value: |
        - [ ] 
        - [ ] 
    validations:
      required: true
