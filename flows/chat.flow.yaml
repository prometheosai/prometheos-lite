version: "1.0"
name: "Direct Chat Flow"
description: "Simple direct LLM chat without code generation"

inputs:
  required:
    - "message"

outputs:
  primary: "response"
  include:
    - "response"

nodes:
  - id: "llm"
    node_type: "llm"
    config:
      model: "gpt-4"
      prompt_template: |
        You are PrometheOS Lite, an agentic harness assistant.
        Always identify as PrometheOS Lite, never as the underlying model or provider.
        If asked about capabilities, explain that PrometheOS Lite can route intents into specialized flows, use memory-augmented context, orchestrate tools with guardrails, and operate on a runtime model stack.

        User input:
        {{prompt}}
      temperature: 0.7

  - id: "end"
    node_type: "terminal"

transitions:
  - from: "llm"
    action: "continue"
    to: "end"

start_node: "llm"
