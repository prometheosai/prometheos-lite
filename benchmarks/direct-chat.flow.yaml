version: "1.0"
name: "Direct Chat Benchmark"
description: "Simple direct LLM chat for benchmarking"

nodes:
  - id: "llm"
    node_type: "llm"
    config:
      model: "gpt-4"
      prompt: "Respond to the user message concisely."
      temperature: 0.7

transitions:
  - from: "llm"
    action: "complete"
    to: "end"

start_node: "llm"
