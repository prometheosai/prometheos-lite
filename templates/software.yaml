name: Software Development
parent_domain: General
default_flows:
  - planning.flow.yaml
  - codegen.flow.yaml
  - review.flow.yaml
artifact_kinds:
  - Code
  - Test
  - Plan
  - Document
approval_defaults:
  autonomy_level: Autonomous
  approval_policy: RequireForSideEffects
lifecycle_template:
  phases:
    - name: Intake
      required_fields:
        - goal
        - requirements
    - name: Planning
      auto_transition: true
      required_flows:
        - planning.flow.yaml
    - name: Execution
      auto_transition: true
      required_flows:
        - codegen.flow.yaml
    - name: Review
      auto_transition: true
      required_flows:
        - review.flow.yaml
    - name: Finalization
      auto_transition: true
