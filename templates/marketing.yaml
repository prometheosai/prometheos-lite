name: Marketing
parent_domain: Business
default_flows:
  - planning.flow.yaml
  - analysis.flow.yaml
  - review.flow.yaml
artifact_kinds:
  - MarketingCopy
  - Document
  - Analysis
  - Report
approval_defaults:
  autonomy_level: Review
  approval_policy: RequireForSideEffects
lifecycle_template:
  phases:
    - name: Intake
      required_fields:
        - goal
        - requirements
    - name: Planning
      auto_transition: true
      required_flows:
        - planning.flow.yaml
    - name: Execution
      auto_transition: true
      required_flows:
        - analysis.flow.yaml
    - name: Review
      auto_transition: true
      required_flows:
        - review.flow.yaml
    - name: Finalization
      auto_transition: true
